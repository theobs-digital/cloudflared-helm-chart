{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cloudflared.fullname" . }}
  labels:
    {{- include "cloudflared.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cloudflared.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 2000
  egress:
    - ports:
        - protocol: UDP
          port: 7844
        - protocol: TCP
          port: 7844
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if and .Values.networkPolicy.allowedNamespaces (has "*" .Values.networkPolicy.allowedNamespaces) }}
    - to:
        - namespaceSelector: {}
    {{- else }}
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
    {{- end }}
    {{- end }}
{{- end }}
