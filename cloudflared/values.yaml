replicaCount: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

image:
  repository: cloudflare/cloudflared
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  enabled: true
  annotations: {}
  # Leave empty to derive a per-release name from the chart fullname.
  # A hardcoded name collides when several releases share a namespace.
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}

opentelemetry:
  enabled: false
  
podLabels: {}

cloudflared:
  tunnelToken: ""
  existingSecret: ""

livenessProbe:
  tcpSocket:
    port: 2000
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /ready
    port: 2000
  initialDelaySeconds: 5
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 800m
    memory: 256Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

terminationGracePeriodSeconds: 30

networkPolicy:
  enabled: false
  allowedNamespaces: ["*"]
  additionalEgress: []
  # - to:
  #     - podSelector:
  #         matchLabels:
  #           app: backend
  #   ports:
  #     - protocol: TCP
  #       port: 8080

metrics:
  service:
    enabled: false
    port: 2000
  serviceMonitor:
    enabled: false
    interval: 30s
    additionalLabels: {}

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cloudflared
          topologyKey: kubernetes.io/hostname
